version: '3.8'

services:
  connect-tracer:
    build: .
    platform: linux/arm64
    container_name: aws-connect-contact-tracer
    stdin_open: true
    tty: true
    volumes:
      # AWS 자격 증명 및 설정 파일 마운트 (SSO 세션 포함)
      - ~/.aws:/root/.aws:ro

      # 애플리케이션 출력 파일 저장 (virtual_env 디렉토리)
      # - ./virtual_env:/app/virtual_env

      # 소스 코드 마운트 (개발 중 수정사항 반영)
      - .:/app

    environment:
      # AWS 환경 변수 (호스트에서 설정된 경우)
      - AWS_PROFILE=${AWS_PROFILE}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-ap-northeast-2}
      - AWS_REGION=${AWS_REGION:-ap-northeast-2}

      # Python 환경 변수
      - PYTHONUNBUFFERED=1

      - GDK_BACKEND=broadway
      - BROADWAY_DISPLAY=:5

    # 웹 서버 포트 노출 (호스트 포트는 랜덤 할당)
    ports:
      - "5000"

    # 웹 서버 실행
    command: /bin/bash -c "chmod +x docker_web_start.sh && ./docker_web_start.sh"
